services:
  postgres:
    image: postgres:16
    container_name: fishwish-postgres
    environment:
      POSTGRES_DB: fishwish
      POSTGRES_USER: fishwish
      POSTGRES_PASSWORD: fishwish123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: fishwish-redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: fishwish-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"

  product-service:
    build:
      context: ../apps/product-service
      dockerfile: Dockerfile
    container_name: fishwish-product-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/fishwish
      - SPRING_DATASOURCE_USERNAME=fishwish
      - SPRING_DATASOURCE_PASSWORD=fishwish123
    depends_on:
      - postgres

  order-service:
    build:
      context: ../apps/order-service
      dockerfile: Dockerfile
    container_name: fishwish-order-service
    ports:
      - "8084:8084"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/fishwish
      - SPRING_DATASOURCE_USERNAME=fishwish
      - SPRING_DATASOURCE_PASSWORD=fishwish123
    depends_on:
      - postgres

volumes:
  postgres_data:
